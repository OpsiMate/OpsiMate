# Schema for actions/labeler v5+ (changed-files / any-glob-to-any-file).
DevOps:
  - changed-files:
      - any-glob-to-any-file:
          - 'devops*'
          - 'infrastructure/**'
          - 'ci/**'
          - 'docker/**'
          - '**/.github/**'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '**/*.md'
          - 'README.md'
          - 'documentation/**'

Server:
  - changed-files:
      - any-glob-to-any-file:
          - '**/server/**'

UI:
  - changed-files:
      - any-glob-to-any-file:
          - '**/client/**'
          - '**/*.css'
          - '**/*.scss'
          - '**/*.html'

Test:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.test.*'
          - '**/tests/**'
          - '**/__tests__/**'
          - '**/test/**'
