version: 2

updates:
  # GitHub Actions used across all workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  # Node/pnpm dependencies (root workspace covers the whole monorepo)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch low-risk minor/patch bumps into one PR to cut noise;
      # majors still open individually so breaking changes are reviewed.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Backend + frontend Docker images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(docker)"

  # Terraform providers/modules
  - package-ecosystem: "terraform"
    directory: "/infrastructure/terraform"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(terraform)"
